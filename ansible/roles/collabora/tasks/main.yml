---
- name: Install required packages
  become: true
  ansible.builtin.apt:
    name:
      - wget
      - gnupg
      - fonts-dejavu
      - fonts-liberation
      - fonts-crosextra-carlito
      - fonts-crosextra-caladea
    state: present
    update_cache: true

- name: Download Collabora signing key
  become: true
  ansible.builtin.get_url:
    url: https://collaboraoffice.com/downloads/gpg/collaboraonline-release-keyring.gpg
    dest: /usr/share/keyrings/collaboraonline-release-keyring.gpg
    mode: "0644"

- name: Configure Collabora repository
  become: true
  ansible.builtin.template:
    src: collaboraonline.sources.j2
    dest: /etc/apt/sources.list.d/collaboraonline.sources
    owner: root
    group: root
    mode: "0644"

- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true

- name: Install Collabora Online
  become: true
  ansible.builtin.apt:
    name:
      - coolwsd
      - nextcloud-office-brand
    state: present
  notify: restart collabora

- name: Configure coolwsd to listen on port 9980
  become: true
  ansible.builtin.lineinfile:
    path: /etc/coolwsd/coolwsd.xml
    regexp: "<port>"
    line: "      <port>9980</port>"
    insertafter: "<listen"
  notify: restart collabora

- name: Allow Nextcloud server in WOPI allow list
  become: true
  ansible.builtin.lineinfile:
    path: /etc/coolwsd/coolwsd.xml
    regexp: "<host allow"
    line: '        <host allow="true">{{ nextcloud_domain }}</host>'
    insertafter: "<storage"
  notify: restart collabora

- name: Ensure Collabora service running
  become: true
  ansible.builtin.service:
    name: coolwsd
    state: started
    enabled: true
