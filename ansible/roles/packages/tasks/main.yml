# =========================
# Update apt cache
# =========================
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
# =========================
# Install packages
# =========================
- name: Install Apache, PHP, Redis and dependencies
  become: true
  ansible.builtin.apt:
    name:
      - apache2
      - redis-server
      - php{{ php_version }}
      - php{{ php_version }}-fpm
      - php-mysql
      - php-curl
      - php-pgsql
      - php-apcu
      - php-bcmath
      - php-dom
      - php-gd
      - php-gmp
      - php-memcached
      - php-redis
      - php-smbclient
      - php-ldap
      - php-zip
      - php-mbstring
      - php-imagick
      - php-intl
      - php-bz2
      - libmagickcore-6.q16-6-extra
      - ffmpeg
      - nfs-common
      - smbclient
      - unzip
    state: present
# =========================
# Apache modules
# =========================
- name: Enable Apache modules
  become: true
  ansible.builtin.command: a2enmod {{ item }}
  args:
    creates: "/etc/apache2/mods-enabled/{{ item }}.load"
  loop:
    - rewrite
    - headers
    - env
    - dir
    - mime
    - ssl
    - proxy_fcgi
    - setenvif
    - mpm_event
  notify: restart apache
- name: Disable prefork and mod_php
  become: true
  ansible.builtin.command: a2dismod {{ item }}
  args:
    removes: "/etc/apache2/mods-enabled/{{ item }}.load"
  loop:
    - php{{ php_version }}
    - mpm_prefork
  ignore_errors: true
  notify: restart apache
- name: Enable PHP FPM Apache config
  become: true
  ansible.builtin.command: a2enconf php{{ php_version }}-fpm
  args:
    creates: "/etc/apache2/conf-enabled/php{{ php_version }}-fpm.conf"
  notify: restart apache
# =========================
# Apache hardening
# =========================
- name: Harden Apache configuration
  become: true
  ansible.builtin.blockinfile:
    path: /etc/apache2/apache2.conf
    marker: "# {mark} ANSIBLE APACHE HARDENING"
    block: |
      ServerTokens Prod
      ServerSignature Off
  notify: restart apache
# =========================
# PHP configuration
# =========================
- name: Configure php.ini
  become: true
  ansible.builtin.lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/php.ini"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - {regexp: '^upload_max_filesize', line: 'upload_max_filesize = {{ php_upload_max_filesize }}'}
    - {regexp: '^post_max_size', line: 'post_max_size = {{ php_post_max_size }}'}
    - {regexp: '^memory_limit', line: 'memory_limit = {{ php_memory_limit }}'}
    - {regexp: '^output_buffering', line: 'output_buffering = {{ php_output_buffering }}'}
    - {regexp: '^expose_php', line: 'expose_php = {{ php_expose_php }}'}
    - {regexp: '^;?opcache.interned_strings_buffer', line: 'opcache.interned_strings_buffer={{ php_opcache_interned_strings_buffer }}'}
  notify: restart php-fpm
- name: Enable APC CLI
  become: true
  ansible.builtin.lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/php.ini"
    line: "apc.enable_cli = 1"
    state: present
  notify: restart php-fpm
# =========================
# PHP-FPM tuning
# =========================
- name: Configure PHP-FPM pool
  become: true
  ansible.builtin.lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/pool.d/www.conf"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - {regexp: '^pm.max_children', line: 'pm.max_children = {{ php_fpm_max_children }}'}
    - {regexp: '^pm.start_servers', line: 'pm.start_servers = {{ php_fpm_start_servers }}'}
    - {regexp: '^pm.min_spare_servers', line: 'pm.min_spare_servers = {{ php_fpm_min_spare }}'}
    - {regexp: '^pm.max_spare_servers', line: 'pm.max_spare_servers = {{ php_fpm_max_spare }}'}
  notify: restart php-fpm
# =========================
# Redis security + socket
# =========================
- name: Secure Redis configuration
  become: true
  ansible.builtin.blockinfile:
    path: /etc/redis/redis.conf
    marker: "# {mark} ANSIBLE REDIS CONFIG"
    block: |
      bind 127.0.0.1 ::1
      protected-mode yes
      unixsocket /run/redis/redis-server.sock
      unixsocketperm 770
  notify: restart redis
- name: Add www-data to redis group
  become: true
  ansible.builtin.user:
    name: www-data
    groups: redis
    append: yes
# =========================
# Ensure services running
# =========================
- name: Ensure Apache running
  become: true
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true
- name: Ensure PHP-FPM running
  become: true
  ansible.builtin.service:
    name: php{{ php_version }}-fpm
    state: started
    enabled: true
- name: Ensure Redis running
  become: true
  ansible.builtin.service:
    name: redis-server
    state: started
    enabled: true
