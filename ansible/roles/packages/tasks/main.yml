- name: Update apt cache
  become: true
  apt:
    update_cache: yes
    cache_valid_time: 3600
# =========================
# Install Packages
# =========================
- name: Install Apache, PHP, Redis and dependencies
  become: true
  apt:
    name:
      - apache2
      - redis-server=6.2.*
      - php{{ php_version }}
      - php{{ php_version }}-fpm
      - php-mysql
      - php-curl
      - php-pgsql
      - php-apcu
      - php-bcmath
      - php-dom
      - php-gd
      - php-gmp
      - php-memcached
      - php-redis
      - php-smbclient
      - php-ldap
      - php-zip
      - php-mbstring
      - php-imagick
      - php-intl
      - php-bz2
      - libmagickcore-6.q16-6-extra
      - ffmpeg
      - nfs-common
      - smbclient
      - unzip
    state: present
# =========================
# Apache Modules
# =========================
- name: Enable required Apache modules
  become: true
  command: a2enmod {{ item }}
  args:
    creates: "/etc/apache2/mods-enabled/{{ item }}.load"
  loop:
    - rewrite
    - headers
    - env
    - dir
    - mime
    - ssl
    - proxy_fcgi
    - setenvif
    - mpm_event
  notify: restart apache
- name: Disable prefork + mod_php
  become: true
  command: a2dismod {{ item }}
  args:
    removes: "/etc/apache2/mods-enabled/{{ item }}.load"
  loop:
    - php{{ php_version }}
    - mpm_prefork
  ignore_errors: true
  notify: restart apache
- name: Enable PHP-FPM Apache config
  become: true
  command: a2enconf php{{ php_version }}-fpm
  args:
    creates: "/etc/apache2/conf-enabled/php{{ php_version }}-fpm.conf"
  notify: restart apache
# =========================
# Apache Security Hardening
# =========================
- name: Harden Apache security headers
  become: true
  blockinfile:
    path: /etc/apache2/apache2.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - APACHE HARDENING"
    block: |
      ServerTokens Prod
      ServerSignature Off
  notify: restart apache
# =========================
# PHP Configuration
# =========================
- name: Configure php.ini settings
  become: true
  lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/php.ini"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    backrefs: yes
  loop:
    - {regexp: '^upload_max_filesize', line: 'upload_max_filesize = {{ php_upload_max_filesize }}'}
    - {regexp: '^post_max_size', line: 'post_max_size = {{ php_post_max_size }}'}
    - {regexp: '^memory_limit', line: 'memory_limit = {{ php_memory_limit }}'}
    - {regexp: '^output_buffering', line: 'output_buffering = {{ php_output_buffering }}'}
    - {regexp: '^expose_php', line: 'expose_php = {{ php_expose_php }}'}
    - {regexp: '^;?opcache.interned_strings_buffer', line: 'opcache.interned_strings_buffer={{ php_opcache_interned_strings_buffer }}'}
  notify: restart php-fpm
- name: Enable APC CLI
  become: true
  lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/php.ini"
    line: "apc.enable_cli = 1"
    state: present
  notify: restart php-fpm
- name: Ensure APC CLI in conf.d
  become: true
  lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/conf.d/20-apcu.ini"
    line: "apc.enable_cli = 1"
    state: present
  notify: restart php-fpm
# =========================
# PHP-FPM Pool Tuning
# =========================
- name: Configure PHP-FPM pool
  become: true
  lineinfile:
    path: "/etc/php/{{ php_version }}/fpm/pool.d/www.conf"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - {regexp: '^pm.max_children', line: 'pm.max_children = {{ php_fpm_max_children }}'}
    - {regexp: '^pm.start_servers', line: 'pm.start_servers = {{ php_fpm_start_servers }}'}
    - {regexp: '^pm.min_spare_servers', line: 'pm.min_spare_servers = {{ php_fpm_min_spare }}'}
    - {regexp: '^pm.max_spare_servers', line: 'pm.max_spare_servers = {{ php_fpm_max_spare }}'}
  notify: restart php-fpm
# =========================
# Redis Security Hardening
# =========================
- name: Secure Redis bind interface
  become: true
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^bind'
    line: 'bind 127.0.0.1 ::1'
  notify: restart redis
- name: Disable Redis protected mode bypass
  become: true
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^protected-mode'
    line: 'protected-mode yes'
  notify: restart redis
- name: Disable Redis TCP external access
  become: true
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^port'
    line: 'port 6379'
  notify: restart redis
# =========================
# Services
# =========================
- name: Ensure Apache running
  become: true
  service:
    name: apache2
    state: started
    enabled: true
- name: Ensure PHP-FPM running
  become: true
  service:
    name: "php{{ php_version }}-fpm"
    state: started
    enabled: true
- name: Ensure Redis running
  become: true
  service:
    name: redis-server
    state: started
    enabled: true
