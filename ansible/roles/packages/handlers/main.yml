- name: restart apache
  become: true
  ansible.builtin.service:
    name: apache2
    state: restarted
- name: restart php-fpm
  become: true
  ansible.builtin.service:
    name: php{{ php_version }}-fpm
    state: restarted
- name: restart redis
  become: true
  ansible.builtin.service:
    name: redis-server
    state: restarted
