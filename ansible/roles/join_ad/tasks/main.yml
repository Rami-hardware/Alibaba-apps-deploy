# =========================
# DNS
# =========================
- name: Detect if systemd-resolved is active
  command: systemctl is-active systemd-resolved
  register: resolved_active
  changed_when: false
  failed_when: false
- name: Set DNS via systemd-resolved
  when: resolved_active.stdout == "active"
  block:
    - name: Get default interface
      shell: "ip -o -4 route show to default | awk '{print $5}' | head -n1"
      register: default_if
      changed_when: false
    - name: Configure DNS
      command: "resolvectl dns {{ default_if.stdout }} {{ ad_server }}"
      changed_when: false
    - name: Configure search domain
      command: "resolvectl domain {{ default_if.stdout }} {{ ad_domain }}"
      changed_when: false
- name: Detect NetworkManager
  command: systemctl is-active NetworkManager
  register: nm_active
  changed_when: false
  failed_when: false
  when: resolved_active.stdout != "active"
- name: Configure DNS via NetworkManager
  when:
    - resolved_active.stdout != "active"
    - nm_active.stdout == "active"
  block:
    - name: Get active connection
      shell: |
        IFACE="$(ip -o -4 route show to default | awk '{print $5}' | head -n1)"
        nmcli -t -f NAME,DEVICE con show --active | awk -F: -v i="$IFACE" '$2==i{print $1; exit}'
      register: nm_conn
      changed_when: false
    - name: Set DNS settings
      command: >
        nmcli con mod "{{ nm_conn.stdout }}" ipv4.dns "{{ ad_server }}" ipv4.dns-search "{{ ad_domain }}" ipv4.ignore-auto-dns yes

      changed_when: false
    - name: Restart connection
      command: nmcli con up "{{ nm_conn.stdout }}"
      changed_when: false
# =========================
# Packages
# =========================
- name: Update apt cache (Debian)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_facts.os_family == 'Debian'
- name: Install packages (Debian)
  apt:
    name:
      - realmd
      - sssd
      - sssd-tools
      - adcli
      - samba-common-bin
      - krb5-user
      - libnss-sss
      - libpam-sss
      - oddjob
      - oddjob-mkhomedir
      - packagekit
      - policykit-1
      - chrony
    state: present
  when: ansible_facts.os_family == 'Debian'
- name: Install packages (RHEL)
  package:
    name:
      - realmd
      - sssd
      - sssd-tools
      - adcli
      - samba-common-tools
      - krb5-workstation
      - oddjob
      - oddjob-mkhomedir
      - chrony
    state: present
  when: ansible_facts.os_family == 'RedHat'
# =========================
# Time Sync
# =========================
- name: Configure chrony
  blockinfile:
    path: /etc/chrony/chrony.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - AD TIME"
    block: |
      server {{ ad_server }} iburst prefer
  notify: restart chrony
- name: Ensure chrony running (Debian)
  service:
    name: chrony
    state: started
    enabled: true
  when: ansible_facts.os_family == 'Debian'
- name: Ensure chrony running (RHEL)
  service:
    name: chronyd
    state: started
    enabled: true
  when: ansible_facts.os_family == 'RedHat'
- name: Force time sync
  command: chronyc -a makestep
  changed_when: false
  failed_when: false
# =========================
# Kerberos Config
# =========================
- name: Configure krb5
  template:
    src: krb5.conf.j2
    dest: /etc/krb5.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart sssd
# =========================
# Join AD
# =========================
- name: Check realm membership
  command: realm list --name-only
  register: realm_list
  changed_when: false
  failed_when: false
- name: Set short computer name
  set_fact:
    ad_computer_name: "{{ ansible_hostname[:15] }}"
- name: Join domain using adcli
  shell: >
    adcli join {{ ad_domain }} --login-user={{ ad_admin_user }} --domain-controller={{ ad_server }} --computer-name={{ ad_computer_name }} --stdin-password

  args:
    stdin: "{{ ad_password }}\n"
  register: adcli_join
  no_log: true
  changed_when: true
  failed_when: adcli_join.rc != 0
  notify: restart sssd
  when: ad_domain not in realm_list.stdout
- name: Validate join
  command: realm list --name-only
  register: realm_list_after
  changed_when: false
  failed_when: false
- name: Fail if join unsuccessful
  fail:
    msg: "Domain join failed."
  when: ad_domain not in realm_list_after.stdout
# =========================
# SSSD Configuration
# =========================
- name: Configure sssd
  template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: '0600'
  notify: restart sssd
- name: Configure nsswitch passwd
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^passwd:'
    line: 'passwd:     files sss'
- name: Configure nsswitch group
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^group:'
    line: 'group:      files sss'
# =========================
# mkhomedir
# =========================
- name: Enable mkhomedir (Debian)
  command: pam-auth-update --enable mkhomedir --force
  changed_when: false
  when: ansible_facts.os_family == 'Debian'
- name: Enable mkhomedir (RHEL)
  shell: |
    if command -v authselect >/dev/null 2>&1; then
      authselect select sssd with-mkhomedir --force
      authselect apply-changes
    elif command -v authconfig >/dev/null 2>&1; then
      authconfig --enablemkhomedir --update
    fi
  changed_when: false
  when: ansible_facts.os_family == 'RedHat'
- name: Ensure sssd running
  service:
    name: sssd
    state: started
    enabled: true
