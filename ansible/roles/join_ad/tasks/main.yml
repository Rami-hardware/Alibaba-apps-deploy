# =========================
# DNS
# =========================
- name: Detect if systemd-resolved is active
  command: systemctl is-active systemd-resolved
  register: resolved_active
  changed_when: false
  failed_when: false
- name: Configure DNS via systemd-resolved
  when: resolved_active.stdout == "active"
  block:
    - name: Get default interface
      shell: ip -o -4 route show to default | awk '{print $5}' | head -n1
      register: default_if
      changed_when: false
    - name: Set DNS server
      command: resolvectl dns {{ default_if.stdout }} {{ ad_server }}
      changed_when: false
    - name: Set search domain
      command: resolvectl domain {{ default_if.stdout }} {{ ad_domain }}
      changed_when: false
- name: Update apt cache (Debian)
  # =========================

  # =========================
  # Packages
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_facts.os_family == "Debian"
- name: Install packages (Debian)
  apt:
    name:
      - realmd
      - sssd
      - sssd-tools
      - adcli
      - samba-common-bin
      - krb5-user
      - libnss-sss
      - libpam-sss
      - oddjob
      - oddjob-mkhomedir
      - chrony
    state: present
  when: ansible_facts.os_family == "Debian"
- name: Install packages (RHEL)
  package:
    name:
      - realmd
      - sssd
      - sssd-tools
      - adcli
      - samba-common-tools
      - krb5-workstation
      - oddjob
      - oddjob-mkhomedir
      - chrony
    state: present
  when: ansible_facts.os_family == "RedHat"
- name: Configure chrony
  # =========================

  # =========================
  # Time Sync
  blockinfile:
    path: /etc/chrony/chrony.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - AD TIME"
    block: |
      server {{ ad_server }} iburst prefer
  notify: restart chrony
- name: Ensure chrony running (Debian)
  service:
    name: chrony
    state: started
    enabled: true
  when: ansible_facts.os_family == "Debian"
- name: Ensure chrony running (RHEL)
  service:
    name: chronyd
    state: started
    enabled: true
  when: ansible_facts.os_family == "RedHat"
- name: Force time sync
  command: chronyc -a makestep
  changed_when: false
  failed_when: false
- name: Configure krb5
  # =========================

  # =========================
  # Kerberos Config
  template:
    src: krb5.conf.j2
    dest: /etc/krb5.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart sssd
- name: Check realm membership
  # =========================

  # =========================
  # Join AD (Stable Method)
  command: realm list --name-only
  register: realm_list
  changed_when: false
  failed_when: false
- name: Set short computer name (15 char NetBIOS limit)
  set_fact:
    ad_computer_name: "{{ ansible_hostname[:15] }}"
- name: Join domain using realm
  command: >
    realm join {{ ad_domain }} --user={{ ad_admin_user }} --computer-name={{ ad_computer_name }}

  args:
    stdin: "{{ ad_password }}\n"
  register: realm_join
  no_log: false
  changed_when: true
  failed_when: realm_join.rc != 0
  when: ad_domain not in realm_list.stdout
  notify: restart sssd
- name: Validate join
  # ---- Validate ----

  command: realm list --name-only
  register: realm_list_after
  changed_when: false
  failed_when: false
- name: Fail if join unsuccessful
  fail:
    msg: "Domain join failed."
  when: ad_domain not in realm_list_after.stdout
- name: Configure sssd
  # =========================

  # =========================
  # SSSD Configuration
  template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: "0600"
  notify: restart sssd
- name: Configure nsswitch passwd
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: "^passwd:"
    line: "passwd:     files sss"
- name: Configure nsswitch group
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: "^group:"
    line: "group:      files sss"
- name: Enable mkhomedir (Debian)
  # =========================

  # =========================
  # mkhomedir
  command: pam-auth-update --enable mkhomedir --force
  changed_when: false
  when: ansible_facts.os_family == "Debian"
- name: Enable mkhomedir (RHEL)
  shell: |
    if command -v authselect >/dev/null 2>&1; then
      authselect select sssd with-mkhomedir --force
      authselect apply-changes
    elif command -v authconfig >/dev/null 2>&1; then
      authconfig --enablemkhomedir --update
    fi
  changed_when: false
  when: ansible_facts.os_family == "RedHat"
- name: Ensure sssd running
  service:
    name: sssd
    state: started
    enabled: true
