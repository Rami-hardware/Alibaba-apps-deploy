# =========================
# DNS
# =========================
- name: Detect if systemd-resolved is active
  command: systemctl is-active systemd-resolved
  register: resolved_active
  changed_when: false
  failed_when: false
- name: Set DNS via systemd-resolved (preferred when active)
  when: resolved_active.stdout == "active"
  block:
    - name: Get default interface
      shell: "ip -o -4 route show to default | awk '{print $5}' | head -n1"
      register: default_if
      changed_when: false
    - name: Configure DNS for default interface
      command: "resolvectl dns {{ default_if.stdout }} {{ ad_server }}"
      changed_when: false
    - name: Configure search domain for default interface
      command: "resolvectl domain {{ default_if.stdout }} {{ ad_domain }}"
      changed_when: false
# If systemd-resolved is NOT active, try NetworkManager first (common on RHEL and some Ubuntu)
- name: Detect NetworkManager
  command: systemctl is-active NetworkManager
  register: nm_active
  changed_when: false
  failed_when: false
  when: resolved_active.stdout != "active"
- name: Set DNS via NetworkManager (when active)
  when:
    - resolved_active.stdout != "active"
    - nm_active.stdout == "active"
  block:
    - name: Get active connection name for default interface
      shell: |
        IFACE="$(ip -o -4 route show to default | awk '{print $5}' | head -n1)"
        nmcli -t -f NAME,DEVICE con show --active | awk -F: -v i="$IFACE" '$2==i{print $1; exit}'
      register: nm_conn
      changed_when: false
    - name: Configure DNS + search domain on active connection
      command: >
        nmcli con mod "{{ nm_conn.stdout }}" ipv4.dns "{{ ad_server }}" ipv4.dns-search "{{ ad_domain }}" ipv4.ignore-auto-dns yes

      changed_when: false
    - name: Restart connection to apply DNS
      command: nmcli con up "{{ nm_conn.stdout }}"
      changed_when: false
# Last resort: only edit /etc/resolv.conf if it is NOT a symlink (so we don't fight resolvconf/systemd-resolved)
- name: Check if /etc/resolv.conf is a symlink
  stat:
    path: /etc/resolv.conf
  register: resolvconf_stat
  when:
    - resolved_active.stdout != "active"
    - nm_active is not defined or nm_active.stdout != "active"
- name: Fallback - ensure AD DNS is set in /etc/resolv.conf (only if not a symlink)
  when:
    - resolved_active.stdout != "active"
    - nm_active is not defined or nm_active.stdout != "active"
    - not resolvconf_stat.stat.islnk
  lineinfile:
    path: /etc/resolv.conf
    regexp: '^nameserver\s+{{ ad_server | regex_escape() }}$'
    line: "nameserver {{ ad_server }}"
    state: present
# =========================
# Packages
# =========================
- name: Ensure apt cache is up to date (Debian/Ubuntu)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'
- name: Install required packages for AD join (Debian/Ubuntu)
  apt:
    name:
      - realmd
      - sssd
      - sssd-tools
      - adcli
      - samba-common-bin
      - krb5-user
      - libnss-sss
      - libpam-sss
      - oddjob
      - oddjob-mkhomedir
      - packagekit
      - policykit-1
      - chrony
    state: present
  when: ansible_facts['os_family'] == 'Debian'
- name: Install required packages for AD join (RHEL/CentOS/Fedora)
  package:
    name:
      - realmd
      - sssd
      - sssd-tools
      - adcli
      - samba-common-tools
      - krb5-workstation
      - oddjob
      - oddjob-mkhomedir
      - chrony
    state: present
  when: ansible_facts['os_family'] == 'RedHat'
# =========================
# Time sync (Kerberos needs correct time)
# =========================
- name: Configure chrony to sync with AD domain controller
  blockinfile:
    path: /etc/chrony/chrony.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK - AD TIME"
    block: |
      server {{ ad_server }} iburst prefer
  notify: restart chrony
- name: Ensure chrony service is running (Debian/Ubuntu)
  service:
    name: chrony
    state: started
    enabled: true
  when: ansible_facts['os_family'] == 'Debian'
- name: Ensure chrony service is running (RHEL)
  service:
    name: chronyd
    state: started
    enabled: true
  when: ansible_facts['os_family'] == 'RedHat'
- name: Force time sync step (ignore if not ready yet)
  command: chronyc -a makestep
  changed_when: false
  failed_when: false
- name: Show time status (debug)
  command: timedatectl
  register: timedate
  changed_when: false
  failed_when: false
- name: Print time status
  debug:
    var: timedate.stdout_lines
# =========================
# Discover + Kerberos config
# =========================
- name: Discover domain
  command: realm discover {{ ad_domain }}
  register: realm_discover
  failed_when: false
  changed_when: false
- name: Configure /etc/krb5.conf
  template:
    src: krb5.conf.j2
    dest: /etc/krb5.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart sssd
# =========================
# Idempotency: skip if already joined
# =========================
- name: Check current realm membership
  command: realm list
  register: realm_list
  changed_when: false
  failed_when: false
# =========================
# Build Kerberos principal safely
# If ad_admin_user already contains '@', use it as-is.
# Otherwise append @ad_realm (NO UPPERCASE)
# =========================
- name: Set Kerberos principal
  set_fact:
    ad_principal: >-
      {{ ad_admin_user if ('@' in ad_admin_user) else (ad_admin_user ~ '@' ~ ad_realm) }}
- name: Debug principal (safe)
  debug:
    msg: "Using Kerberos principal: {{ ad_principal }}"
# =========================
# Pre-check: verify credentials with kinit
# FIX: add newline to stdin
# =========================
- name: Kerberos auth test (kinit) - secure (uses stdin)
  shell: "kinit {{ ad_principal }}"
  args:
    stdin: "{{ ad_password }}\n"
  register: kinit_result
  no_log: true
  changed_when: false
  when: ad_domain not in realm_list.stdout
- name: Kerberos debug (kinit -V) - safe output (no password)
  command: "kinit -V {{ ad_principal }}"
  register: kinit_debug
  changed_when: false
  failed_when: false
  when: (ad_domain not in realm_list.stdout) and (kinit_result is failed)
- name: Print kinit debug stderr (safe)
  debug:
    var: kinit_debug.stderr_lines
  when: (ad_domain not in realm_list.stdout) and (kinit_result is failed)
- name: Fail with clear message if Kerberos auth fails
  fail:
    msg: "Kerberos authentication failed for {{ ad_principal }}. See kinit -V debug output above."
  when: (ad_domain not in realm_list.stdout) and (kinit_result is failed)
# =========================
# Join domain (secure + idempotent)
# Use realm join (recommended). Password via stdin with newline.
# =========================
- name: Join domain using realm (creates keytab)
  shell: >
    realm join {{ ad_domain }} --user={{ ad_admin_user }} --membership-software=adcli --verbose

  args:
    stdin: "{{ ad_password }}\n"
  register: realm_join
  no_log: true
  changed_when: true
  failed_when: realm_join.rc != 0
  notify: restart sssd
  when: ad_domain not in realm_list.stdout
# =========================
# SSSD configuration
# =========================
- name: Ensure /etc/sssd/sssd.conf from template
  template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: '0600'
  notify: restart sssd
- name: Configure nsswitch to use sss (passwd)
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^passwd:'
    line: 'passwd:     files sss'
    create: false
- name: Configure nsswitch to use sss (group)
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^group:'
    line: 'group:      files sss'
    create: false
# Enable mkhomedir properly (don’t drop random pam files)
- name: Enable mkhomedir on Debian/Ubuntu (pam-auth-update)
  command: pam-auth-update --enable mkhomedir --force
  changed_when: false
  when: ansible_facts['os_family'] == 'Debian'
- name: Enable mkhomedir on RHEL (authselect/authconfig)
  shell: |
    if command -v authselect >/dev/null 2>&1; then
      authselect current >/dev/null 2>&1 || authselect select sssd with-mkhomedir --force
      authselect enable-feature with-mkhomedir || true
      authselect apply-changes
    elif command -v authconfig >/dev/null 2>&1; then
      authconfig --enablemkhomedir --update
    else
      exit 0
    fi
  changed_when: false
  when: ansible_facts['os_family'] == 'RedHat'
- name: Ensure sssd service running
  service:
    name: sssd
    state: started
    enabled: true
