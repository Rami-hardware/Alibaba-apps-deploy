name: Deploying Nextcloud

on:
  push:
    branches:
      - development
      - staging
      - main



env:
  ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
  ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout Repo
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # -----------------------------
      # Setup Terraform
      # -----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ">=1.6 <2.0"

      # -----------------------------
      # Terraform Init
      # -----------------------------
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # -----------------------------
      # Terraform Validate
      # -----------------------------
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      # -----------------------------
      # Terraform Plan
      # -----------------------------
      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -detailed-exitcode \
            -out=tfplan || exitcode=$?
          echo "exitcode=${exitcode:-0}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # -----------------------------
      # Terraform Apply (ONLY if changes)
      # -----------------------------
      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2'
        working-directory: terraform
        run: |
          terraform apply \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -auto-approve tfplan

      # -----------------------------
      # Get Public IP from Terraform
      # -----------------------------
      - name: Get Public IP
        id: get_ip
        if: steps.plan.outputs.exitcode == '2'
        working-directory: terraform
        run: |
          echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      # -----------------------------
      # Setup SSH Key
      # -----------------------------
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALI_PEM_KEY }}" > ~/.ssh/RamiKey.pem
          chmod 600 ~/.ssh/RamiKey.pem

      # -----------------------------
      # Disable SSH Host Key Checking
      # -----------------------------
      - name: Disable SSH host key checking
        if: steps.plan.outputs.exitcode == '2'
        run: |
          echo -e "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # -----------------------------
      # Test SSH
      # -----------------------------
      - name: Test SSH connection
        if: steps.plan.outputs.exitcode == '2'
        run: |
          ssh -i ~/.ssh/RamiKey.pem root@${{ steps.get_ip.outputs.ip }} "echo connected"

      # -----------------------------
      # Run Ansible
      # -----------------------------
      - name: Run Ansible
        if: steps.plan.outputs.exitcode == '2'
        working-directory: ansible
        env:
          AD_PASSWORD: ${{ secrets.AD_ADMIN_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault_pass.txt
          chmod 600 vault_pass.txt

          ansible-playbook \
            -i inventory.ini \
            deploy.yml \
            --vault-password-file vault_pass.txt \
            -e "ad_password=$AD_PASSWORD" \
            -e "db_password=$DB_PASSWORD" \
            -e "ad_domain=fac.local ad_realm=FAC.LOCAL ad_server=10.50.6.206 ad_admin_user=administrator"